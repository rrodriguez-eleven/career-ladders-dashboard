<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eleven Career Ladders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #1C2B3A;
    --navy-2: #24384B;
    --navy-3: #2E4759;
    --orange: #E05A2B;
    --orange-soft: #F3D9CC;
    --paper: #F6F7F9;
    --panel: #FFFFFF;
    --line: #DFE3E8;
    --ink: #1C2B3A;
    --ink-soft: #5C6B7A;
    --rail: #C7CDD5;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Montserrat', sans-serif;
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4,.display{
    font-family:'Raleway', sans-serif;
    letter-spacing:-0.01em;
  }
  a{color:inherit;}

  /* ---------- Layout shell ---------- */
  .app{
    display:grid;
    grid-template-columns: 300px 1fr;
    min-height:100vh;
  }
  @media (max-width: 860px){
    .app{grid-template-columns: 1fr;}
    .sidebar{position:static; height:auto;}
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    background: var(--navy);
    color:#EDEFF2;
    padding:28px 20px 24px;
    position:sticky;
    top:0;
    height:100vh;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    padding-bottom:16px;
    border-bottom:1px solid rgba(255,255,255,0.12);
    transition: opacity .15s;
  }
  .brand:hover{opacity:0.8;}
  .brand .mark-icon{
    width:26px;height:26px;
    object-fit:contain;
    flex:0 0 auto;
  }
  .brand h1{
    font-size:19px;
    font-weight:800;
    margin:0;
    color:#fff;
  }
  .brand span{
    font-size:11px;
    color:rgba(255,255,255,0.55);
    display:block;
    margin-top:2px;
    letter-spacing:0.04em;
    text-transform:uppercase;
  }
  .search-wrap{position:relative;}
  .search-wrap input{
    width:100%;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.14);
    border-radius:8px;
    padding:10px 12px 10px 32px;
    color:#fff;
    font-family:'Montserrat',sans-serif;
    font-size:13.5px;
    outline:none;
  }
  .search-wrap input::placeholder{color:rgba(255,255,255,0.45);}
  .search-wrap input:focus{border-color:var(--orange);}
  .search-wrap svg{
    position:absolute; left:10px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; opacity:0.5;
  }
  nav.deptnav{display:flex; flex-direction:column; gap:3px;}
  .nav-label{
    font-size:10.5px;
    text-transform:uppercase;
    letter-spacing:0.09em;
    color:rgba(255,255,255,0.4);
    margin:4px 4px 6px;
  }
  .deptnav button{
    all:unset; box-sizing:border-box;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    padding:10px 12px;
    border-radius:8px;
    font-size:13.5px;
    font-weight:500;
    color:rgba(255,255,255,0.78);
    transition: background 0.15s, color 0.15s;
  }
  .deptnav button:hover{background:rgba(255,255,255,0.06); color:#fff;}
  .deptnav button.active{
    background: rgba(224,90,43,0.16);
    color:#fff;
    font-weight:600;
    box-shadow: inset 3px 0 0 var(--orange);
  }
  .deptnav button .count{
    font-size:11px;
    color:rgba(255,255,255,0.4);
    font-weight:500;
  }
  .deptnav button.active .count{color:rgba(255,255,255,0.65);}
  .deptnav button .rightwrap{display:flex; align-items:center; gap:6px;}
  .status-dot{
    width:6px; height:6px; border-radius:50%;
    background:#E0A62B;
    flex:0 0 auto;
    box-shadow:0 0 0 3px rgba(224,166,43,0.18);
  }
  .status-pill{
    font-size:10px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
    color:#3A2C0E; background:#F0B93D;
    padding:3px 9px; border-radius:20px;
    display:inline-flex; align-items:center; gap:5px;
    white-space:nowrap;
  }
  .status-pill::before{
    content:""; width:6px; height:6px; border-radius:50%; background:#8A5A00;
  }
  .status-banner{
    display:flex; gap:12px; align-items:flex-start;
    background:#FFF8EB; border:1px solid #F0D89A;
    border-radius:10px; padding:14px 16px; margin:18px 0 28px;
  }
  .status-banner .icon{font-size:16px; line-height:1.3;}
  .status-banner p{margin:0; font-size:13px; line-height:1.55; color:#6B4E12;}
  .status-banner strong{color:#4d3606;}

  /* ---------- Homepage ---------- */
  .hero{
    padding:6px 0 8px;
    border-bottom:1px solid var(--line);
    margin-bottom:32px;
  }
  .hero .kicker{
    font-size:11.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--orange); margin-bottom:10px;
  }
  .hero h1{
    font-size:34px; font-weight:800; color:var(--navy); margin:0 0 12px; line-height:1.15;
  }
  .hero p{
    font-size:14.5px; color:var(--ink-soft); max-width:640px; line-height:1.65; margin:0 0 24px;
  }
  .stat-row{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr));
    gap:14px; margin-bottom:8px;
  }
  .stat-card{
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:16px 18px;
  }
  .stat-card .num{
    font-family:'Raleway',sans-serif; font-size:28px; font-weight:800; color:var(--navy);
    line-height:1;
  }
  .stat-card .lbl{
    font-size:12px; color:var(--ink-soft); margin-top:6px; font-weight:500;
  }
  .stat-card.warn .num{color:#C97A1A;}

  .section-title{
    font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--ink-soft); margin:38px 0 16px;
  }
  .dept-grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(220px,1fr));
    gap:14px;
  }
  .dept-card{
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:18px 18px 16px; cursor:pointer; text-align:left;
    transition:border-color .15s, box-shadow .15s;
    display:flex; flex-direction:column; gap:10px;
  }
  .dept-card:hover{border-color:var(--orange); box-shadow:0 2px 10px rgba(28,43,58,0.06);}
  .dept-card .top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .dept-card h4{font-size:15.5px; font-weight:700; color:var(--navy); margin:0;}
  .dept-card .stats{font-size:12px; color:var(--ink-soft);}
  .dept-card .arrow{color:var(--orange); font-size:16px; align-self:flex-end;}

  .howto{
    display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr));
    gap:18px;
  }
  .howto-step{
    background:#fff; border:1px solid var(--line); border-radius:12px; padding:16px 18px;
  }
  .howto-step .top-row{
    display:flex; align-items:center; gap:10px; margin-bottom:8px;
  }
  .howto-step .n{
    width:24px; height:24px; border-radius:6px; background:var(--navy); color:#fff;
    display:flex; align-items:center; justify-content:center; font-weight:800;
    font-family:'Raleway',sans-serif; font-size:12px; flex:0 0 auto;
  }
  .howto-step h5{font-size:14px; font-weight:700; color:var(--navy); margin:0;}
  .howto-step p{font-size:12.5px; color:var(--ink-soft); margin:0; line-height:1.5;}

  .home-footer{
    margin-top:40px; padding-top:22px; border-top:1px solid var(--line);
    font-size:12.5px; color:var(--ink-soft);
  }
  .home-footer a{color:var(--navy); font-weight:600; text-decoration:underline;}

  .compare-tray{
    margin-top:auto;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    padding:14px;
  }
  .compare-tray h4{
    margin:0 0 8px;
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.07em;
    color:rgba(255,255,255,0.55);
    font-family:'Montserrat',sans-serif;
    font-weight:600;
  }
  .compare-tray .hint{
    font-size:12px;
    color:rgba(255,255,255,0.4);
    line-height:1.5;
  }
  .compare-slot{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12.5px;
    padding:7px 9px;
    background:rgba(255,255,255,0.08);
    border-radius:6px;
    margin-bottom:6px;
    color:#fff;
  }
  .compare-slot button{
    all:unset; box-sizing:border-box; cursor:pointer; color:rgba(255,255,255,0.5); font-size:14px; line-height:1;
  }
  .compare-cta{
    all:unset; box-sizing:border-box;
    display:block;
    width:100%;
    text-align:center;
    margin-top:8px;
    padding:9px;
    background:var(--orange);
    color:#fff;
    border-radius:7px;
    font-size:12.5px;
    font-weight:700;
    cursor:pointer;
    letter-spacing:0.02em;
  }
  .compare-cta:disabled{
    background:rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.35);
    cursor:not-allowed;
  }

  /* ---------- Main ---------- */
  main{padding:36px 44px 80px; max-width:1180px;}
  .topline{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:20px; margin-bottom:6px; flex-wrap:wrap;
  }
  .topline h2{
    font-size:30px; font-weight:800; margin:0; color:var(--navy);
  }
  .topline .sub{
    color:var(--ink-soft); font-size:13.5px; margin-top:6px;
  }
  .mode-toggle{
    display:flex; gap:8px; align-items:center;
    background:#fff; border:1px solid var(--line);
    padding:5px; border-radius:9px;
  }
  .mode-toggle button{
    all:unset; box-sizing:border-box; cursor:pointer;
    padding:7px 14px; border-radius:6px;
    font-size:12.5px; font-weight:600; color:var(--ink-soft);
  }
  .mode-toggle button.active{background:var(--navy); color:#fff;}

  .family-block{margin-top:40px;}
  .family-head{
    display:flex; align-items:baseline; gap:10px; margin-bottom:18px;
  }
  .family-head h3{
    font-size:15.5px; font-weight:700; color:var(--navy); margin:0;
    text-transform:uppercase; letter-spacing:0.04em;
  }
  .family-head .rule{flex:1; height:1px; background:var(--line);}
  .family-head .n{font-size:12px; color:var(--ink-soft);}

  /* Ladder */
  .ladder{
    position:relative;
    padding-left:34px;
  }
  .ladder::before{
    content:"";
    position:absolute;
    left:9px; top:6px; bottom:6px;
    width:2px;
    background: linear-gradient(to bottom, var(--orange), var(--rail));
  }
  .rung{
    position:relative;
    margin-bottom:10px;
  }
  .rung::before{
    content:"";
    position:absolute;
    left:-30px; top:22px;
    width:12px; height:12px;
    border-radius:50%;
    background:var(--panel);
    border:2px solid var(--rail);
    z-index:2;
  }
  .rung.top-band::before{border-color:var(--orange); background:var(--orange);}
  .rung.selected::before{border-color:var(--orange); background:var(--orange);}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
    cursor:pointer;
    transition: border-color .15s, box-shadow .15s, transform .1s;
    display:flex; align-items:center; justify-content:space-between; gap:14px;
  }
  .card:hover{border-color:var(--orange); box-shadow:0 2px 10px rgba(28,43,58,0.06);}
  .card.selected{border-color:var(--orange); box-shadow:0 0 0 3px rgba(224,90,43,0.12);}
  .card.dim{opacity:0.35;}
  .card.path-highlight{border-color:var(--orange); box-shadow:0 0 0 3px rgba(224,90,43,0.14);}

  .card-left{display:flex; align-items:center; gap:12px; min-width:0;}
  .band-chip{
    flex:0 0 auto;
    width:30px; height:30px; border-radius:7px;
    background:var(--navy);
    color:#fff;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; font-family:'Raleway',sans-serif;
  }
  .card-title{min-width:0;}
  .card-title .t{font-size:14.5px; font-weight:700; color:var(--navy); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .card-title .m{font-size:11.5px; color:var(--ink-soft); margin-top:1px;}
  .card-right{display:flex; align-items:center; gap:10px; flex:0 0 auto;}
  .comp-pill{
    font-size:10.5px; font-weight:600; color:var(--navy-3);
    background:#EEF1F4; padding:4px 9px; border-radius:20px;
    white-space:nowrap;
  }
  .add-btn{
    all:unset; box-sizing:border-box; cursor:pointer;
    width:26px; height:26px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    border:1px solid var(--line);
    color:var(--ink-soft);
    font-size:15px;
    flex:0 0 auto;
  }
  .add-btn:hover{border-color:var(--orange); color:var(--orange);}
  .add-btn.added{background:var(--orange); border-color:var(--orange); color:#fff;}

  /* Detail drawer */
  .overlay{
    position:fixed; inset:0; background:rgba(28,43,58,0.35);
    opacity:0; pointer-events:none; transition:opacity .18s;
    z-index:40;
  }
  .overlay.show{opacity:1; pointer-events:auto;}
  .drawer{
    position:fixed; top:0; right:0; height:100vh;
    width:min(460px, 92vw);
    background:var(--panel);
    box-shadow:-8px 0 30px rgba(28,43,58,0.18);
    transform:translateX(100%);
    transition:transform .22s ease;
    z-index:41;
    overflow-y:auto;
    padding:30px 30px 50px;
  }
  .drawer.show{transform:translateX(0);}
  .drawer-close{
    all:unset; box-sizing:border-box; cursor:pointer; float:right;
    font-size:20px; color:var(--ink-soft); line-height:1;
    padding:4px;
  }
  .drawer .eyebrow{
    font-size:11px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--orange); font-weight:700; margin-bottom:6px;
  }
  .drawer h2{font-size:23px; color:var(--navy); margin:0 0 4px; font-weight:800;}
  .drawer .meta-row{
    display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 22px;
  }
  .meta-tag{
    font-size:11.5px; font-weight:600; color:var(--navy-3);
    background:#EEF1F4; padding:5px 10px; border-radius:20px;
  }
  .drawer section{margin-bottom:20px;}
  .drawer section h4{
    font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--ink-soft); font-weight:700; margin:0 0 6px;
  }
  .drawer section p{font-size:14px; line-height:1.6; margin:0; color:var(--ink);}
  .next-box{
    background:#FBF3EF; border:1px solid var(--orange-soft);
    border-radius:10px; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    cursor:pointer;
  }
  .next-box:hover{border-color:var(--orange);}
  .next-box .t{font-size:13.5px; font-weight:700; color:var(--navy);}
  .next-box .arrow{color:var(--orange); font-size:18px;}
  .drawer-add{
    all:unset; box-sizing:border-box; cursor:pointer; display:block; width:100%;
    text-align:center; padding:11px; margin-top:6px;
    border-radius:8px; border:1px solid var(--navy);
    color:var(--navy); font-weight:700; font-size:13px;
  }
  .drawer-add.added{background:var(--navy); color:#fff;}

  /* Compare view */
  .compare-grid{
    display:grid;
    grid-template-columns: 130px repeat(auto-fit, minmax(220px, 1fr));
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
  }
  .compare-grid .cell{background:var(--panel); padding:14px 16px;}
  .compare-grid .rowlabel{
    background:var(--paper); font-size:11.5px; font-weight:700;
    text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);
    display:flex; align-items:center;
  }
  .compare-grid .headcell{
    background:var(--navy); color:#fff; position:relative;
  }
  .compare-grid .headcell .t{font-size:15px; font-weight:800; font-family:'Raleway',sans-serif;}
  .compare-grid .headcell .m{font-size:11px; color:rgba(255,255,255,0.65); margin-top:3px;}
  .compare-grid .headcell .rm{
    position:absolute; top:10px; right:10px; all:unset; box-sizing:border-box; cursor:pointer;
    color:rgba(255,255,255,0.6); font-size:15px;
  }
  .compare-grid .cell p{margin:0; font-size:13px; line-height:1.55; color:var(--ink);}
  .empty-compare{
    text-align:center; padding:70px 20px; color:var(--ink-soft);
  }
  .empty-compare .big{font-size:40px; margin-bottom:14px;}

  /* Search results */
  .search-results{margin-top:30px;}
  .search-results .rescount{font-size:12.5px; color:var(--ink-soft); margin-bottom:16px;}
  .result-row{
    display:flex; justify-content:space-between; align-items:center;
    background:#fff; border:1px solid var(--line); border-radius:10px;
    padding:13px 16px; margin-bottom:8px; cursor:pointer;
  }
  .result-row:hover{border-color:var(--orange);}
  .result-row .path{font-size:11px; color:var(--ink-soft); margin-top:2px;}

  ::-webkit-scrollbar{width:9px;}
  ::-webkit-scrollbar-thumb{background:rgba(28,43,58,0.15); border-radius:6px;}
  .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;}
  }
</style>
</head>
<body>

<div class="app">

:"High influence; shapes accounting policy and financial reporting across the org; trusted advisor to VP","next":"VP of Finance"},{"band":"5","title":"VP of Finance","comp":"Market 50 - 75%","yrs":"15+","scope":"Owns the full finance function; partners with COO/CEO and board on financial strategy, fundraising, and long-range planning; accountable for all financial reporting and compliance","complexity":"Full-function complexity; manages financial strategy, fundraising, investor relations, and operational finance concurrently","autonomy":"Full executive autonomy over finance function; reports to COO/CEO; self-directed on strategy and execution","influence":"Company-wide influence; partners with COO/CEO, board, and investors; shapes financial culture and strategy","next":"CFO"},{"band":"6","title":"CFO","comp":"Market 50 - 75%","yrs":"15+","scope":"Top executive; sets company-wide financial vision and strategy; accountable to board and investors; drives capital allocation, M&A, and financial risk management","complexity":"Enterprise-level complexity; navigates board, investor, regulatory, and strategic financial demands simultaneously","autonomy":"Full board-level autonomy; sets financial direction independently; accountable to COO/CEO and board","influence":"Board-level influence; sets financial vision for entire organization; external-facing with investors and stakeholders","next":"Board / Executive leadership"}]}]}]};

<script>
(function(){
  const state = {
    activeDept: JOB_DATA.departments[0].name,
    mode: 'home', // home | browse | compare
    compare: [], // array of {dept, family, role}
    selectedKey: null,
    search: ''
  };

  function roleKey(dept, family, role){ return dept+'|'+family+'|'+role.title; }

  function allRolesFlat(){
    const out = [];
    JOB_DATA.departments.forEach(d=>{
      if(d.status) return; // skip departments whose framework isn't finalized yet
      d.families.forEach(f=>{
        f.roles.forEach(r=>{
          out.push({dept:d.name, family:f.name, role:r});
        });
      });
    });
    return out;
  }
  const FLAT = allRolesFlat();

  function findRoleByTitle(title){
    // fuzzy: exact match first, else includes
    let hit = FLAT.find(x => x.role.title.toLowerCase() === title.toLowerCase());
    if(hit) return hit;
    hit = FLAT.find(x => title.toLowerCase().includes(x.role.title.toLowerCase()) || x.role.title.toLowerCase().includes(title.toLowerCase()));
    return hit;
  }

  function renderNav(){
    const nav = document.getElementById('deptNav');
    nav.innerHTML = '';
    JOB_DATA.departments.forEach(d=>{
      const count = d.families.reduce((a,f)=>a+f.roles.length,0);
      const btn = document.createElement('button');
      btn.className = (d.name===state.activeDept && state.mode==='browse') ? 'active' : '';
      const statusHtml = d.status ? `<span class="status-dot" title="${d.statusLabel||'In progress'}"></span>` : '';
      const countHtml = d.status ? '' : `<span class="count">${count}</span>`;
      btn.innerHTML = `<span>${d.name}</span><span class="rightwrap">${statusHtml}${countHtml}</span>`;
      btn.onclick = ()=>{ state.mode='browse'; state.activeDept=d.name; state.search=''; document.getElementById('searchInput').value=''; render(); };
      nav.appendChild(btn);
    });
  }

  function renderCompareTray(){
    document.getElementById('compareCount').textContent = state.compare.length;
    const slots = document.getElementById('compareSlots');
    slots.innerHTML = '';
    state.compare.forEach((c,i)=>{
      const div = document.createElement('div');
      div.className = 'compare-slot';
      div.innerHTML = `<span>${c.role.title}</span>`;
      const btn = document.createElement('button');
      btn.textContent = '×';
      btn.onclick = (e)=>{ e.stopPropagation(); state.compare.splice(i,1); render(); };
      div.appendChild(btn);
      slots.appendChild(div);
    });
    document.getElementById('compareHint').style.display = state.compare.length ? 'none' : 'block';
    const cbtn = document.getElementById('compareBtn');
    cbtn.disabled = state.compare.length < 2;
    cbtn.textContent = state.compare.length < 2 ? 'Add 2+ to compare' : `Compare ${state.compare.length} roles`;
    cbtn.onclick = ()=>{ if(state.compare.length>=2){ state.mode='compare'; render(); } };
  }

  function isInCompare(key){
    return state.compare.some(c => roleKey(c.dept,c.family,c.role)===key);
  }

  function toggleCompare(dept, family, role){
    const key = roleKey(dept,family,role);
    const idx = state.compare.findIndex(c=>roleKey(c.dept,c.family,c.role)===key);
    if(idx>-1){ state.compare.splice(idx,1); }
    else{
      if(state.compare.length>=3) return;
      state.compare.push({dept,family,role});
    }
    renderCompareTray();
    // also refresh main to update add-btn state visuals without full rerender jank
    renderMain();
  }

  function openDrawer(dept, family, role){
    state.selectedKey = roleKey(dept,family,role);
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('overlay');
    const key = state.selectedKey;
    const inCompare = isInCompare(key);
    drawer.innerHTML = `
      <button class="drawer-close" id="drawerClose">×</button>
      <div class="eyebrow">${dept} · ${family}</div>
      <h2>${role.title}</h2>
      <div class="meta-row">
        <span class="meta-tag">Band ${role.band}</span>
        ${role.yrs ? `<span class="meta-tag">${role.yrs} yrs experience</span>`: ''}
        ${role.comp ? `<span class="meta-tag">${role.comp}</span>` : ''}
      </div>
      ${role.scope ? `<section><h4>Scope</h4><p>${role.scope}</p></section>` : ''}
      ${role.complexity ? `<section><h4>Complexity</h4><p>${role.complexity}</p></section>` : ''}
      ${role.autonomy ? `<section><h4>Autonomy</h4><p>${role.autonomy}</p></section>` : ''}
      ${role.influence ? `<section><h4>Influence</h4><p>${role.influence}</p></section>` : ''}
      ${role.next ? `
      <section>
        <h4>Career path</h4>
        <div id="nextBox" class="next-box"><span class="t">${role.next}</span><span class="arrow">→</span></div>
      </section>` : ''}
      <button class="drawer-add ${inCompare?'added':''}" id="drawerAddBtn">${inCompare ? '✓ Added to compare' : '+ Add to compare'}</button>
    `;
    document.getElementById('drawerClose').onclick = closeDrawer;
    document.getElementById('drawerAddBtn').onclick = ()=>{ toggleCompare(dept,family,role); openDrawer(dept,family,role); };
    const nextBox = document.getElementById('nextBox');
    if(nextBox){
      nextBox.onclick = ()=>{
        // next may list multiple options separated by "or"; try first title match
        const candidates = role.next.split(/ or |\/| \(| — /i);
        let hit = null;
        for(const c of candidates){
          hit = findRoleByTitle(c.trim());
          if(hit) break;
        }
        if(hit){
          state.mode='browse';
          state.activeDept = hit.dept;
          state.search='';
          document.getElementById('searchInput').value='';
          render();
          setTimeout(()=>openDrawer(hit.dept, hit.family, hit.role), 60);
        }
      };
    }
    overlay.classList.add('show');
    drawer.classList.add('show');
    overlay.onclick = closeDrawer;
  }
  function closeDrawer(){
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('drawer').classList.remove('show');
    state.selectedKey = null;
  }

  function roleCardHTML(dept, family, role, opts){
    opts = opts || {};
    const key = roleKey(dept,family,role);
    const inCompare = isInCompare(key);
    return `
      <div class="rung">
        <div class="card ${opts.highlight?'path-highlight':''}" data-key="${key}">
          <div class="card-left">
            <div class="band-chip">${role.band}</div>
            <div class="card-title">
              <div class="t">${role.title}</div>
              <div class="m">${role.yrs ? role.yrs+' yrs · ' : ''}${family}</div>
            </div>
          </div>
          <div class="card-right">
            ${role.comp ? `<span class="comp-pill">${role.comp.split(' / ')[0]}</span>` : ''}
            <button class="add-btn ${inCompare?'added':''}" data-addkey="${key}" title="Add to compare">${inCompare?'✓':'+'}</button>
          </div>
        </div>
      </div>
    `;
  }

  function attachCardHandlers(container){
    container.querySelectorAll('.card').forEach(el=>{
      el.addEventListener('click', (e)=>{
        if(e.target.closest('.add-btn')) return;
        const key = el.getAttribute('data-key');
        const found = FLAT.find(x=>roleKey(x.dept,x.family,x.role)===key);
        if(found) openDrawer(found.dept, found.family, found.role);
      });
    });
    container.querySelectorAll('.add-btn').forEach(el=>{
      el.addEventListener('click', (e)=>{
        e.stopPropagation();
        const key = el.getAttribute('data-addkey');
        const found = FLAT.find(x=>roleKey(x.dept,x.family,x.role)===key);
        if(found) toggleCompare(found.dept, found.family, found.role);
      });
    });
  }

  function renderHome(){
    const totalDepts = JOB_DATA.departments.length;
    const finalizedDepts = JOB_DATA.departments.filter(d=>!d.status);
    const inProgressDepts = JOB_DATA.departments.filter(d=>d.status);
    const totalRoles = finalizedDepts.reduce((sum,d)=>sum + d.families.reduce((a,f)=>a+f.roles.length,0), 0);
    const totalFamilies = finalizedDepts.reduce((sum,d)=>sum + d.families.length, 0);

    let html = `
      <div class="hero">

          <div style="width:1px; height:34px; background:var(--line);"></div>
          <h1 style="margin:0;">Career Ladders</h1>
        </div>
        <p>A living map of every job family, level, and career path at Eleven. See what's expected at each level, compare roles side by side, and find out what's next on your path, without digging through spreadsheets.</p>
        <div class="stat-row">
          <div class="stat-card"><div class="num">${totalDepts}</div><div class="lbl">Departments mapped</div></div>
          <div class="stat-card"><div class="num">${totalRoles}</div><div class="lbl">Defined roles</div></div>
          <div class="stat-card"><div class="num">${totalFamilies}</div><div class="lbl">Job families</div></div>
          <div class="stat-card warn"><div class="num">${inProgressDepts.length}</div><div class="lbl">Still being built out</div></div>
        </div>
      </div>

      <div class="section-title">Browse by department</div>
      <div class="dept-grid">
        ${JOB_DATA.departments.map(d=>{
          const count = d.families.reduce((a,f)=>a+f.roles.length,0);
          return `
            <button class="dept-card" data-goto="${d.name}">
              <div class="top">
                <h4>${d.name}</h4>
                ${d.status ? `<span class="status-pill">${d.statusLabel||'In progress'}</span>` : ''}
              </div>
              <div class="stats">${d.status ? 'Framework in progress' : `${d.families.length} job famil${d.families.length===1?'y':'ies'} · ${count} roles`}</div>
              <span class="arrow">→</span>
            </button>
          `;
        }).join('')}
      </div>

      <div class="section-title">How to use this dashboard</div>
      <div class="howto">
        <div class="howto-step">
          <div class="top-row"><div class="n">1</div><h5>Browse levels</h5></div>
          <p>Pick a department to see its job families laid out as career ladders, from entry level to senior leadership.</p>
        </div>
        <div class="howto-step">
          <div class="top-row"><div class="n">2</div><h5>Click a role</h5></div>
          <p>See exactly what's expected at each level: scope, complexity, autonomy, influence, and typical years of experience.</p>
        </div>
        <div class="howto-step">
          <div class="top-row"><div class="n">3</div><h5>Compare or search</h5></div>
          <p>Add up to three roles to compare side by side, or use the search bar to jump straight to a title across every department.</p>
        </div>
      </div>

      <div class="home-footer">
        Part of the <a href="https://eleven.atlassian.net/wiki/spaces/HR/pages/4314529912/Job+Architecture+Framework" target="_blank" rel="noopener">Job Architecture Framework</a> project. Questions? Reach out to the People Team.
      </div>
    `;
    return html;
  }

  function renderBrowse(){
    const dept = JOB_DATA.departments.find(d=>d.name===state.activeDept);
    let html = `
      <div class="topline">
        <div>
          <h2>${dept.name} ${dept.status ? `<span class="status-pill">${dept.statusLabel||'In progress'}</span>` : ''}</h2>
          <div class="sub">${dept.status ? "This department's framework is still being built out." : `${dept.families.length} job famil${dept.families.length===1?'y':'ies'} · ${dept.families.reduce((a,f)=>a+f.roles.length,0)} defined roles. Click any role for full details, or add roles to compare.`}</div>
        </div>
        ${dept.status ? '' : `
        <div class="mode-toggle">
          <button class="active">Browse</button>
          <button id="toCompareBtn">Compare</button>
        </div>`}
      </div>
    `;

    if(dept.status){
      html += `
        <div class="empty-compare" style="padding:90px 20px;">
          <div class="big">🚧</div>
          <h3 style="color:var(--navy); font-size:18px; margin:0 0 8px;">${dept.statusLabel||'In progress'}</h3>
          <p style="max-width:440px; margin:0 auto;">${dept.statusNote || "This department's job architecture hasn't been finalized yet. Check back once the framework has been built out."}</p>
        </div>
      `;
      return html;
    }

    dept.families.forEach(fam=>{
      // display senior-to-junior top-to-bottom (reverse of stored ascending-band order)
      const roles = fam.roles.slice().reverse();
      html += `
        <div class="family-block">
          <div class="family-head">
            <h3>${fam.name}</h3>
            <div class="rule"></div>
            <span class="n">${fam.roles.length} levels</span>
          </div>
          <div class="ladder">
            ${roles.map((r,i)=>roleCardHTML(dept.name, fam.name, r, {})).join('')}
          </div>
        </div>
      `;
    });
    return html;
  }

  function renderSearch(){
    const q = state.search.toLowerCase();
    const results = FLAT.filter(x => x.role.title.toLowerCase().includes(q) || x.dept.toLowerCase().includes(q) || x.family.toLowerCase().includes(q));
    let html = `
      <div class="topline">
        <div>
          <h2>Search results</h2>
          <div class="sub">Matches for "${state.search}"</div>
        </div>
      </div>
      <div class="search-results">
        <div class="rescount">${results.length} role${results.length===1?'':'s'} found</div>
        ${results.map(r=>`
          <div class="result-row" data-key="${roleKey(r.dept,r.family,r.role)}">
            <div>
              <div style="font-weight:700; color:var(--navy); font-size:14px;">${r.role.title}</div>
              <div class="path">${r.dept} · ${r.family} · Band ${r.role.band}</div>
            </div>
            <span class="comp-pill">${r.role.comp ? r.role.comp.split(' / ')[0] : ''}</span>
          </div>
        `).join('')}
      </div>
    `;
    return html;
  }

  function renderCompare(){
    if(state.compare.length < 2){
      return `
        <div class="topline">
          <div><h2>Compare roles</h2><div class="sub">Pick at least two roles to see them side by side.</div></div>
          <div class="mode-toggle"><button id="toBrowseBtn">Browse</button><button class="active">Compare</button></div>
        </div>
        <div class="empty-compare">
          <div class="big">⇄</div>
          <p>Add roles from the sidebar tray or any role card, then come back here.</p>
        </div>
      `;
    }
    const rows = [
      ['Band', r=>r.band],
      ['Comp band', r=>r.comp],
      ['Experience', r=>r.yrs],
      ['Scope', r=>r.scope],
      ['Complexity', r=>r.complexity],
      ['Autonomy', r=>r.autonomy],
      ['Influence', r=>r.influence],
      ['Next level', r=>r.next],
    ];
    let html = `
      <div class="topline">
        <div><h2>Compare roles</h2><div class="sub">Side-by-side view of ${state.compare.length} roles.</div></div>
        <div class="mode-toggle"><button id="toBrowseBtn">Browse</button><button class="active">Compare</button></div>
      </div>
      <div class="compare-grid" style="grid-template-columns: 130px repeat(${state.compare.length}, minmax(220px,1fr));">
        <div class="cell rowlabel"></div>
        ${state.compare.map((c,i)=>`
          <div class="cell headcell">
            <button class="rm" data-rmidx="${i}">×</button>
            <div class="t">${c.role.title}</div>
            <div class="m">${c.dept} · ${c.family}</div>
          </div>
        `).join('')}
        ${rows.map(([label, get])=>`
          <div class="cell rowlabel">${label}</div>
          ${state.compare.map(c=>`<div class="cell"><p>${get(c.role)||'—'}</p></div>`).join('')}
        `).join('')}
      </div>
    `;
    return html;
  }

  function renderMain(){
    const main = document.getElementById('mainContent');
    let html;
    if(state.search.trim().length>0){
      html = renderSearch();
    } else if(state.mode==='compare'){
      html = renderCompare();
    } else if(state.mode==='home'){
      html = renderHome();
    } else {
      html = renderBrowse();
    }
    main.innerHTML = html;
    attachCardHandlers(main);

    main.querySelectorAll('[data-goto]').forEach(card=>{
      card.onclick = ()=>{
        state.mode='browse';
        state.activeDept = card.getAttribute('data-goto');
        render();
      };
    });

    const toCompareBtn = document.getElementById('toCompareBtn');
    if(toCompareBtn) toCompareBtn.onclick = ()=>{ state.mode='compare'; render(); };
    const toBrowseBtn = document.getElementById('toBrowseBtn');
    if(toBrowseBtn) toBrowseBtn.onclick = ()=>{ state.mode='browse'; render(); };

    main.querySelectorAll('.result-row').forEach(row=>{
      row.onclick = ()=>{
        const key = row.getAttribute('data-key');
        const found = FLAT.find(x=>roleKey(x.dept,x.family,x.role)===key);
        if(found) openDrawer(found.dept, found.family, found.role);
      };
    });
    main.querySelectorAll('[data-rmidx]').forEach(btn=>{
      btn.onclick = ()=>{
        state.compare.splice(parseInt(btn.getAttribute('data-rmidx')),1);
        render();
      };
    });
  }

  function render(){
    renderNav();
    renderCompareTray();
    renderMain();
  }

  document.getElementById('searchInput').addEventListener('input', (e)=>{
    state.search = e.target.value;
    renderMain();
    renderNav();
  });

  document.getElementById('brandHome').addEventListener('click', ()=>{
    state.mode='home'; state.search='';
    document.getElementById('searchInput').value='';
    render();
  });

  render();
})();
</script>
</body>
</html>
